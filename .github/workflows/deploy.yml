name: Deploy

# Runs after CI succeeds on production, so a broken build/lint never
# reaches migrations or the hosting platforms. `main` is the team's
# integration branch; pushing to `production` is a deliberate release
# step (see git-workflow.md).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [production]

jobs:
  migrate-and-deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run database migrations
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # alembic/env.py imports app.core.config, which instantiates Settings() at
          # import time and so validates every field. Migrations never sign a token
          # or call Gemini, but the import fails without these. Locally they come from
          # the gitignored backend/.env, which no CI checkout has.
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          pip install -r requirements.txt
          alembic upgrade head

      - name: Trigger Render backend deploy
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - uses: actions/setup-node@v4
        with:
          # Matches the Vercel project's nodeVersion (24.x). `vercel build` runs here,
          # not on Vercel, so this Node is what actually builds production. Also clears
          # vite@8's engine floor (^20.19.0 || >=22.12.0).
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Deploy frontend to Vercel
        # Runs from the repo root on purpose. The Vercel project sets Root Directory
        # to "frontend" and the CLI resolves it against the working directory, so
        # running this from frontend/ resolves frontend/frontend. That does not error:
        # the build falls back to @vercel/static, emits no static/ output, and still
        # exits 0 -- publishing an empty site. Keep this at the root.
        #
        # Git integration is intentionally disconnected (no per-dev Vercel access
        # required, no Vercel checks blocking PRs to main). This token-based deploy
        # is the only deploy path, so it must carry the org/project IDs itself
        # since there is no committed frontend/.vercel link to resolve them.
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx vercel build --prod --token="$VERCEL_TOKEN"
          npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
