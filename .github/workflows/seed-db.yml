name: Seed database

# Manual, on-demand: (re)apply backend/db/*.sql against DATABASE_URL.
# Useful the first time a new environment's DB is provisioned, or after the
# POI seed changes (see root README's Data/ML sync rule).
on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Seed POI table
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: psql "$DATABASE_URL" -f backend/db/03_dml_seed_poi_table.sql

      - name: Seed POI busyness forecast table
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: psql "$DATABASE_URL" -f backend/db/04_dml_seed_busyness_forecast.sql

      - name: Seed POI availability mode
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: psql "$DATABASE_URL" -f backend/db/05_insert_poi_availability_mode.sql

      - name: Update POI best-visit windows
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: psql "$DATABASE_URL" -f backend/db/06_dml_update_poi_best_time.sql
